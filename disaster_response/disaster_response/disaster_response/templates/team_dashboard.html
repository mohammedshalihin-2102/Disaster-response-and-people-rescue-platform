{% extends "base.html" %}
{% block content %}

<h2>Rescue Team Dashboard</h2>

<table class="table table-bordered">
    <tr>
        <th>Assignment ID</th>
        <th>Incident ID</th>
        <th>Status</th>
    </tr>

    {% for a in assignments %}
    <tr>
        <td>{{ a.assignment_id }}</td>
        <td>{{ a.incident_id }}</td>
        <td>{{ a.status }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
